<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        label {
            
            margin-right: 3%;

        }
        .lname {
            top: 13%;
            left: 100px;
            position: absolute;
        }
        input[type=text] {
    border: 2px;
    border-radius: 4px;
    margin: 8px 0;
    outline: none;
    padding: 8px;
    box-sizing: border-box;
    transition: .3s;
    width: 207px;
}

input[type=text]:focus {
    border-color: dodgerblue;
    box-shadow: 0 0 8px 0 dodgerblue;    

}

input[type=email] {
    border: 2px;
    border-radius: 4px;
    margin: 8px 0;
    outline: none;
    padding: 8px;
    box-sizing: border-box;
    transition: .3s;
    width: 209px;
}

input[type=email]:focus {
    border-color: dodgerblue;
    box-shadow: 0 0 8px 0 dodgerblue;    

}

input[type=button] {
    padding: 5px 5px;
    line-height: 1.25;
    background: #FC6E51;
    text-decoration: none;
    color: white;
    font-size: 16px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;

}

* {

    font-family: "Montserrat", sans-serif;

}

.message {
    transform:scaleY(1.5);
}

.message-label {
    margin-right: 2%;
    top: -45px;
    position: relative;
}

body {
    background-color: #b9c8cc;
    height: 100vh;
    display: block;
    align-items: center;
    justify-content: center;
    gap: 40px;
}

.radio-button {
    appearance: none;
    border: 1px solid #D1D5D8;
    padding: 20px 30px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    cursor: pointer;
    gap: 10px;

}

.radio-button::before {
    content: "";
    background-color: #D1D5D8;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    box-sizing: border-box;
    transition: border .1s linear;
}

.radio-button::after {
    content: attr(label);
    color: #D1D5D8;
    font-size: 22px;
    text-transform: uppercase;
    font-weight: 500;
}

.radio-button:checked {
    background-color: #3498D8;
    border-color: #3498D8;
}

.radio-button:checked::before {
    border: 4px solid #D1D5D8;
    background-color: #3498D8;


}

textarea {
    border: 2px;
    border-radius: 4px;
    margin: 8px 0;
    outline: none;
    padding: 8px;
    box-sizing: border-box;
    transition: .3s;
    width: 207px;
}

textarea {
    border-color: dodgerblue;
    box-shadow: 0 0 8px 0 dodgerblue;    

}

    </style>
</head>
<body>
    <form action="" method="post">
        <h3>Kontak </h3>
        <label for="name">Name         </label><input type="text" name="" id="" placeholder="First Name"> <label><br></label><input type="text" name="" class="lname" placeholder="Last Name">
        <br><br><label for="">Gender</label><input type="radio" name="gender" class="radio">Female
        <input type="radio" name="gender" id="">Male
        <input type="radio" name="" id="">Other <br>
        <br><label for="E-mail">E-mail</label><input type="email" name="" id=""> <br>
        <label for="Message" class="message-label">Message</label><textarea name="" id=""></textarea><br>
        <input type="submit" value="Send">
    </form>
</body>
</html>
